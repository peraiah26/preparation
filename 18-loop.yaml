- name: packages
  hosts: local
  connection: local
  become: yes
  tasks:
  - name: install and uninstall packages 
    ansible.builtin.package:
      name: "{{ item.name }}"
      state: "{{ item.state }}"
    loop:
    -  { name: "nginx",  state: "absent" }
    -  { name: "mysql",  state: "absent" }
    -  { name: "nginx",  state: "present" }